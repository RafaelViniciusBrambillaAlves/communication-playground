services:
  rest-service:
    container_name: rest-service
    build: ./services/rest-service
    env_file:
      - ./services/rest-service/.env
    ports:
      - "8001:8000"
    volumes:
      - ./services/rest-service:/app  
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - mongo

  # graphql-service:
