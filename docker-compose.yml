  grpc-service:
    container_name: grpc-service

    build:
      context: ./services/grpc-service

    env_file:
      - ./services/grpc-service/.env

    ports:
      - "8003:8080"

    depends_on:
      sqlserver:
        condition: service_healthy
      
    networks:
      - services-network


  # mongo:
  #   image: mongo:7
  #   container_name: mongo_db
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongo_data:/data/db
  #   restart: unless-stopped
    
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

    healthcheck:
      test: 
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - services-network

volumes:
  # mongo_data:
  sql_data:

networks:
  services-network:
    driver: bridge