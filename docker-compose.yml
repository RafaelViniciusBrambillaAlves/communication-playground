  # docker-compose.yml  (adicionar ao arquivo existente)

  rabbitmq-producer:
    container_name: rabbitmq-producer

    build: ./services/rabbitmq-service/producer

    env_file:
      - ./services/rabbitmq-service/producer/.env

    ports:
      - "8005:8000"

    volumes:
      - ./services/rabbitmq-service/producer:/app

    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    depends_on:
      rabbitmq:
        condition: service_healthy

    networks:
      - services-network

  rabbitmq-consumer:
    container_name: rabbitmq-consumer

    build:
      context: ./services/rabbitmq-service/consumer

    env_file:
      - ./services/rabbitmq-service/consumer/.env

    ports:
      - "8006:8080"

    depends_on:
      rabbitmq:
        condition: service_healthy
      sqlserver:
        condition: service_healthy

    networks:
      - services-network


  # rabbitmq-consumer:
  #   container_name: rabbitmq-consumer

  #   build:
  #     context: ./services/rabbitmq-service/consumer

  #   env_file:
