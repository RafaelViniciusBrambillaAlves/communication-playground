  #     sqlserver:
  #       condition: service_healthy

  #   networks:
  #     - services-network


  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq

    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - services-network




  # mongo:
  #   image: mongo:7

  #   container_name: mongo_db

  #   ports:
  #     - "27017:27017"

  #   volumes:
  #     - mongo_data:/data/db

  #   restart: unless-stopped
    

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest

    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssqlfrabbitmq

    healthcheck:
      test: 
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - services-network



volumes:
  # mongo_data:
  sql_data:
  rabbitmq_data:

networks:
  services-network:
    driver: bridge